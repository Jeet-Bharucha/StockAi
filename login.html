<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — StockAI</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00d4ff">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#050b1f;--cyan:#00d4ff;--cyan2:#0066ff;--green:#00ff88;--red:#ff4466;--text:#e2e8f0;--muted:#64748b;--border:rgba(0,212,255,0.18)}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}

/* Particle background */
#bg-canvas{position:fixed;inset:0;z-index:0}

.page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column}

/* NAV */
nav{padding:1.2rem 2rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);backdrop-filter:blur(20px);background:rgba(5,11,31,0.5)}
.logo{display:flex;align-items:center;gap:.5rem;text-decoration:none;color:inherit}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--cyan),var(--cyan2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem}
.logo span{font-size:1.2rem;font-weight:800;background:linear-gradient(90deg,var(--cyan),#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-right{font-size:.85rem;color:var(--muted)}
.nav-right a{color:var(--cyan);text-decoration:none;font-weight:600}

/* MAIN */
main{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem}

.auth-card{width:100%;max-width:440px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:24px;padding:2.5rem;backdrop-filter:blur(30px);box-shadow:0 30px 80px rgba(0,0,0,0.5)}
.auth-header{text-align:center;margin-bottom:2rem}
.auth-icon{width:56px;height:56px;background:linear-gradient(135deg,rgba(0,102,255,0.3),rgba(0,212,255,0.2));border:1px solid var(--border);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;margin:0 auto 1rem}
.auth-header h1{font-size:1.6rem;font-weight:800;letter-spacing:-0.03em;margin-bottom:.4rem}
.auth-header p{color:var(--muted);font-size:.88rem}

/* Form */
.form-group{margin-bottom:1.2rem}
label{display:block;font-size:.82rem;font-weight:600;color:var(--muted);margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.06em}
.input-wrap{position:relative}
.input-wrap .icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:1rem;pointer-events:none;opacity:.5}
input[type=email],input[type=password],input[type=text]{width:100%;padding:.75rem .9rem .75rem 2.6rem;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:.93rem;font-family:'Inter',sans-serif;outline:none;transition:.2s}
input:focus{border-color:var(--cyan);background:rgba(0,212,255,0.06);box-shadow:0 0 0 3px rgba(0,212,255,0.1)}
input::placeholder{color:var(--muted);opacity:.7}

.form-footer{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;font-size:.82rem}
.form-footer a{color:var(--cyan);text-decoration:none}
.remember{display:flex;align-items:center;gap:.4rem;color:var(--muted);cursor:pointer}
.remember input[type=checkbox]{accent-color:var(--cyan);width:14px;height:14px;padding:0}

.btn-submit{width:100%;padding:.9rem;background:linear-gradient(135deg,var(--cyan2),var(--cyan));border:none;border-radius:12px;color:#fff;font-size:.97rem;font-weight:700;cursor:pointer;transition:.2s;font-family:'Inter',sans-serif;position:relative;overflow:hidden}
.btn-submit:hover{transform:translateY(-1px);box-shadow:0 8px 30px rgba(0,102,255,0.4)}
.btn-submit:active{transform:translateY(0)}
.btn-submit .spinner{display:none;width:18px;height:18px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.btn-submit.loading .btn-text{display:none}
.btn-submit.loading .spinner{display:block}

.divider{display:flex;align-items:center;gap:1rem;margin:1.5rem 0;color:var(--muted);font-size:.8rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

.social-btns{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin-bottom:1.5rem}
.btn-social{padding:.7rem;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:.85rem;font-weight:500;cursor:pointer;transition:.2s;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:.5rem}
.btn-social:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.2)}

.auth-switch{text-align:center;font-size:.85rem;color:var(--muted)}
.auth-switch a{color:var(--cyan);text-decoration:none;font-weight:600}

/* Error */
.error-msg{display:none;padding:.7rem 1rem;background:rgba(255,68,102,0.1);border:1px solid rgba(255,68,102,0.3);border-radius:8px;color:#ff6b8a;font-size:.85rem;margin-bottom:1rem}
.error-msg.show{display:block}

/* Password toggle */
.pwd-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:.9rem;padding:0}
.pwd-toggle:hover{color:var(--cyan)}

@media(max-width:480px){.auth-card{padding:1.8rem 1.4rem;border-radius:16px}}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<div class="page">
  <nav>
    <a href="index.html" class="logo">
      <div class="logo-icon">📈</div>
      <span>StockAI</span>
    </a>
    <div class="nav-right">No account? <a href="register.html">Sign up free →</a></div>
  </nav>

  <main>
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-icon">🔐</div>
        <h1>Welcome back</h1>
        <p>Sign in to your StockAI account</p>
      </div>

      <div class="error-msg" id="error-msg"></div>

      <form id="login-form" autocomplete="on">
        <div class="form-group">
          <label>Email Address</label>
          <div class="input-wrap">
            <span class="icon">✉️</span>
            <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
          </div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <span class="icon">🔒</span>
            <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
            <button type="button" class="pwd-toggle" id="pwd-toggle">👁</button>
          </div>
        </div>
        <div class="form-footer">
          <label class="remember">
            <input type="checkbox" id="remember"> Remember me
          </label>
          <a href="#">Forgot password?</a>
        </div>
        <button type="submit" class="btn-submit" id="submit-btn">
          <span class="btn-text">Sign In →</span>
          <div class="spinner"></div>
        </button>
      </form>

      <div class="divider">or continue with</div>
      <div class="social-btns">
        <button class="btn-social" onclick="guestLogin()">👤 Continue as Guest</button>
        <button class="btn-social" onclick="showInfo()">ℹ️ How it works</button>
      </div>

      <div class="auth-switch">Don't have an account? <a href="register.html">Create one free</a></div>
    </div>
  </main>
</div>

<script src="js/auth.js"></script>
<script>
// Redirect if already logged in
if(Auth.getSession()) window.location.href='dashboard.html';

// Prefill last used email
const lastEmail = localStorage.getItem('stockai_last_email');
if(lastEmail) {
  document.getElementById('email').value = lastEmail;
  document.getElementById('remember').checked = true;
}

// Particle background
(function(){
  const canvas=document.getElementById('bg-canvas');
  const ctx=canvas.getContext('2d');
  let W=window.innerWidth,H=window.innerHeight;
  canvas.width=W;canvas.height=H;
  const pts=Array.from({length:80},()=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:1+Math.random()*2}));
  window.addEventListener('resize',()=>{W=window.innerWidth;H=window.innerHeight;canvas.width=W;canvas.height=H});
  function draw(){
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='rgba(5,11,31,1)';ctx.fillRect(0,0,W,H);
    // gradient orbs
    const g1=ctx.createRadialGradient(W*.2,H*.3,0,W*.2,H*.3,400);
    g1.addColorStop(0,'rgba(0,102,255,0.12)');g1.addColorStop(1,'transparent');
    ctx.fillStyle=g1;ctx.fillRect(0,0,W,H);
    const g2=ctx.createRadialGradient(W*.8,H*.7,0,W*.8,H*.7,350);
    g2.addColorStop(0,'rgba(0,212,255,0.08)');g2.addColorStop(1,'transparent');
    ctx.fillStyle=g2;ctx.fillRect(0,0,W,H);

    pts.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0||p.x>W)p.vx*=-1;
      if(p.y<0||p.y>H)p.vy*=-1;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle='rgba(0,212,255,0.4)';ctx.fill();
    });
    pts.forEach((a,i)=>pts.slice(i+1).forEach(b=>{
      const d=Math.hypot(a.x-b.x,a.y-b.y);
      if(d<120){ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.strokeStyle=`rgba(0,212,255,${0.15*(1-d/120)})`;ctx.lineWidth=.5;ctx.stroke();}
    }));
    requestAnimationFrame(draw);
  }
  draw();
})();

// Form
document.getElementById('login-form').addEventListener('submit',async function(e){
  e.preventDefault();
  const btn=document.getElementById('submit-btn');
  const errEl=document.getElementById('error-msg');
  btn.classList.add('loading');
  errEl.classList.remove('show');
  await new Promise(r=>setTimeout(r,600));
  const remember=document.getElementById('remember').checked;
  const result=Auth.login(
    document.getElementById('email').value.trim(),
    document.getElementById('password').value,
    remember
  );
  btn.classList.remove('loading');
  if(result.success){ window.location.href='dashboard.html'; }
  else{ errEl.textContent=result.error; errEl.classList.add('show'); }
});

// Password toggle
document.getElementById('pwd-toggle').addEventListener('click',function(){
  const inp=document.getElementById('password');
  inp.type=inp.type==='password'?'text':'password';
  this.textContent=inp.type==='password'?'👁':'🙈';
});

function guestLogin(){
  Auth.loginAsGuest();
  window.location.href='dashboard.html';
}

function showInfo(){
  alert('StockAI uses localStorage for accounts — no server required.\n\nCreate a free account to save your watchlist, portfolio, and price alerts.\n\nFor live market data, add your free Finnhub API key via the dashboard settings.');
}
</script>
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
